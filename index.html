<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纳斯达克100 ETF 数据看板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-size: 14px; background: #f5f7fa; }
        .header { background: linear-gradient(135deg, #1a237e, #283593); color: white; padding: 20px 0; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; margin: 0; }
        .header .update-time { font-size: 0.85rem; opacity: 0.8; }

        .table-wrapper { overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .table-wrapper table { margin: 0; white-space: nowrap; font-size: 13px; }
        .table-wrapper th { background: #e8eaf6; color: #1a237e; font-weight: 600; position: sticky; top: 0; z-index: 2; }
        .table-wrapper td { vertical-align: middle; }

        .sticky-col { position: sticky; left: 0; background: white; z-index: 3; }
        .sticky-col-2 { position: sticky; left: 70px; background: white; z-index: 3; }
        .table-wrapper th.sticky-col { background: #e8eaf6; }
        .table-wrapper th.sticky-col-2 { background: #e8eaf6; }

        .alert-red { background-color: #fee2e2 !important; color: #b91c1c; font-weight: 600; }
        .alert-green { background-color: #dcfce7 !important; color: #15803d; font-weight: 600; }
        .alert-orange { background-color: #fef3c7 !important; color: #b45309; font-weight: 600; }

        .col-group { text-align: center !important; font-size: 12px; background: #c5cae9 !important; }

        @media (max-width: 768px) {
            .table-wrapper table { font-size: 12px; }
            .header h1 { font-size: 1.2rem; }
        }

        .legend { display: flex; gap: 16px; flex-wrap: wrap; margin: 10px 0; font-size: 12px; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-color { width: 16px; height: 16px; border-radius: 3px; }

        #loading { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1>纳斯达克100 ETF 数据看板</h1>
                    <div class="update-time" id="update-time">加载中...</div>
                </div>
                <div class="text-end">
                    <button class="btn btn-sm btn-outline-light" onclick="refreshData()">刷新数据</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid px-3">
        <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background:#fee2e2;border:1px solid #fca5a5"></div> 溢价率 &gt; 5% (高溢价风险)</div>
            <div class="legend-item"><div class="legend-color" style="background:#dcfce7;border:1px solid #86efac"></div> 溢价率 &lt; -3% (折价机会)</div>
            <div class="legend-item"><div class="legend-color" style="background:#fef3c7;border:1px solid #fcd34d"></div> 距52周高 &lt; 5% (接近新高)</div>
        </div>

        <div id="loading">正在加载数据...</div>

        <div class="table-wrapper" id="table-container" style="display:none;">
            <table class="table table-bordered table-hover mb-0">
                <thead>
                    <tr>
                        <th rowspan="2" class="sticky-col" style="min-width:70px">代码</th>
                        <th rowspan="2" class="sticky-col-2" style="min-width:120px">名称</th>
                        <th colspan="6" class="col-group">核心行情</th>
                        <th colspan="4" class="col-group">均线指标</th>
                        <th colspan="4" class="col-group">52周区间</th>
                        <th colspan="6" class="col-group">区间涨幅</th>
                        <th rowspan="2" class="col-group">溢价率</th>
                    </tr>
                    <tr>
                        <th>最新价</th>
                        <th>涨跌额</th>
                        <th>涨跌幅(%)</th>
                        <th>成交量</th>
                        <th>成交额(万)</th>
                        <th>开盘价</th>
                        <th>50日线</th>
                        <th>距50日(%)</th>
                        <th>200日线</th>
                        <th>距200日(%)</th>
                        <th>52周最高</th>
                        <th>52周最低</th>
                        <th>距最高(%)</th>
                        <th>距最低(%)</th>
                        <th>近1周</th>
                        <th>近1月</th>
                        <th>近3月</th>
                        <th>近6月</th>
                        <th>近1年</th>
                        <th>今年</th>
                    </tr>
                </thead>
                <tbody id="data-body"></tbody>
            </table>
        </div>

        <div class="text-center text-muted mt-3 mb-3" style="font-size: 12px;">
            数据来源: 腾讯财经(实时行情+IOPV) / 天天基金(历史净值) | 每日 5:00 自动更新
        </div>
    </div>

    <script>
        // 渲染数据 行
        function renderRow(r) {
            const pct = r['涨跌幅(%)'] || 0;
            const pctClass = pct > 3 ? 'alert-red' : (pct < -3 ? 'alert-green' : '');

            const premium = r['溢价率(%)'] || 0;
            const premiumClass = premium > 5 ? 'alert-red' : (premium < -3 ? 'alert-green' : '');

            const distHigh = r['距52周高(%)'] || 0;
            const distHighClass = distHigh > -5 ? 'alert-orange' : '';

            const vol = r['成交量'] ? r['成交量'].toLocaleString() : '-';
            const amt = r['成交额'] ? Math.round(r['成交额'] / 10000).toLocaleString() : '-';

            return `<tr>
                <td class="sticky-col"><strong>${r['代码']}</strong></td>
                <td class="sticky-col-2">${r['名称']}</td>
                <td>${r['最新价']}</td>
                <td>${r['涨跌额']}</td>
                <td class="${pctClass}">${r['涨跌幅(%)']}%</td>
                <td>${vol}</td>
                <td>${amt}</td>
                <td>${r['开盘价']}</td>
                <td>${r['50日均线']}</td>
                <td>${r['距50日线(%)']}%</td>
                <td>${r['200日均线']}</td>
                <td>${r['距200日线(%)']}%</td>
                <td>${r['52周最高']}</td>
                <td>${r['52周最低']}</td>
                <td class="${distHighClass}">${r['距52周高(%)']}%</td>
                <td>${r['距52周低(%)']}%</td>
                <td>${r['近1周涨幅']}%</td>
                <td>${r['近1月涨幅']}%</td>
                <td>${r['近3月涨幅']}%</td>
                <td>${r['近6月涨幅']}%</td>
                <td>${r['近1年涨幅']}%</td>
                <td>${r['今年涨幅']}%</td>
                <td class="${premiumClass}">${r['溢价率(%)']}%</td>
            </tr>`;
        }

        function loadData() {
            fetch('data/nasdaq_etf_daily.json?t=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('data-body');
                    tbody.innerHTML = data.map(renderRow).join('');
                    if (data.length > 0) {
                        document.getElementById('update-time').textContent = '数据更新于: ' + data[0]['日期'];
                    }
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('table-container').style.display = 'block';
                })
                .catch(e => {
                    document.getElementById('loading').textContent = '加载失败，请刷新重试: ' + e;
                });
        }

        function refreshData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').textContent = '正在刷新...';
            document.getElementById('table-container').style.display = 'none';
            loadData();
        }

        // 初始加载
        loadData();

        // 每5分钟自动检查更新
        setInterval(() => {
            fetch('data/nasdaq_etf_daily.json?t=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    if (data.length > 0 && data[0]['日期'] !== document.getElementById('update-time').textContent.replace('数据更新于: ', '')) {
                        loadData();
                    }
                })
                .catch(() => {});
        }, 300000);
    </script>
</body>
</html>
